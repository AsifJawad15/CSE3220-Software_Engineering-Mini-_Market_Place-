<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Products - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.sidebar{min-height:100vh;background:#1e293b}.sidebar .nav-link{color:#94a3b8;border-radius:8px;margin-bottom:4px}.sidebar .nav-link:hover,.sidebar .nav-link.active{background:#334155;color:#fff}.sidebar .brand{color:#fff;font-weight:700;font-size:1.2rem}.card{border:none;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.07)}</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/sidebar :: seller('products')}"></div>
        <div class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-box-seam me-2 text-warning"></i>My Products</h4>
                <a th:if="${profile.approvalStatus.name() == 'APPROVED'}" th:href="@{/seller/products/new}" class="btn btn-warning text-dark btn-sm fw-semibold"><i class="bi bi-plus-circle me-1"></i>Add Product</a>
            </div>
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            <div th:if="${profile.approvalStatus.name() != 'APPROVED'}" class="alert alert-warning"><i class="bi bi-info-circle me-2"></i>Your shop must be approved before you can add products.</div>
            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
                <i class="bi bi-box-seam fs-1 d-block mb-2"></i><p>No products yet.</p>
            </div>
            <div class="table-responsive" th:if="${!#lists.isEmpty(products)}">
                <table class="table table-hover align-middle bg-white rounded">
                    <thead class="table-light"><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="p : ${products}">
                            <td class="fw-semibold" th:text="${p.name}">Name</td>
                            <td><span class="badge bg-secondary" th:text="${p.category.name}">Cat</span></td>
                            <td>$<span th:text="${#numbers.formatDecimal(p.price,1,2)}">0</span></td>
                            <td th:text="${p.stockQuantity}">0</td>
                            <td><span th:if="${p.active}" class="badge bg-success">Active</span><span th:unless="${p.active}" class="badge bg-danger">Inactive</span></td>
                            <td>
                                <a th:href="@{/seller/products/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/seller/products/{id}/delete(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this product?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
