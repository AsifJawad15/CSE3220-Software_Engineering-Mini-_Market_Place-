<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${editMode} ? 'Edit Product' : 'New Product'">Product Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.sidebar{min-height:100vh;background:#1e293b}.sidebar .nav-link{color:#94a3b8;border-radius:8px;margin-bottom:4px}.sidebar .nav-link:hover,.sidebar .nav-link.active{background:#334155;color:#fff}.sidebar .brand{color:#fff;font-weight:700;font-size:1.2rem}.card{border:none;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.07)}</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar px-3 py-4">
            <div class="brand mb-4 px-2"><i class="bi bi-shop me-2"></i>MiniMarket</div>
            <nav class="nav flex-column">
                <a class="nav-link" th:href="@{/seller/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" th:href="@{/seller/profile}"><i class="bi bi-person me-2"></i>Shop Profile</a>
                <a class="nav-link active" th:href="@{/seller/products}"><i class="bi bi-box-seam me-2"></i>Products</a>
                <hr style="border-color:#334155">
                <form th:action="@{/logout}" method="post" class="d-inline"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/><button type="submit" class="nav-link btn btn-link text-start w-100 border-0" style="color:#94a3b8"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></form>
            </nav>
        </div>
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-box-seam me-2 text-warning"></i><span th:text="${editMode} ? 'Edit Product' : 'New Product'">Form</span></h4>
            <div class="card p-4" style="max-width:700px">
                <form th:action="${editMode} ? @{/seller/products/{id}/edit(id=${productId})} : @{/seller/products/new}"
                      method="post" th:object="${productRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Name *</label>
                        <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Price *</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Stock Quantity</label>
                            <input type="number" th:field="*{stockQuantity}" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Category *</label>
                            <select th:field="*{categoryId}" class="form-select" th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                                <option value="">Select...</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{categoryId}"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Image URL (optional)</label>
                        <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://example.com/image.jpg">
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeCheck">
                        <label class="form-check-label" for="activeCheck">Active (visible to buyers)</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check-lg me-1"></i><span th:text="${editMode} ? 'Update' : 'Create'">Save</span></button>
                        <a th:href="@{/seller/products}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
