<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orders - Seller Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: seller('orders')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-bag-check me-2 text-warning"></i>My Orders</h4>

            <!-- Alerts -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(orderItems)}" class="text-center py-5">
                <i class="bi bi-inbox" style="font-size:4rem; color:#adb5bd;"></i>
                <h4 class="mt-3 text-muted">No orders for your products yet</h4>
            </div>

            <!-- Order Items Table -->
            <div th:unless="${#lists.isEmpty(orderItems)}" class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Order #</th>
                            <th>Product</th>
                            <th class="text-center">Qty</th>
                            <th class="text-end">Price</th>
                            <th class="text-end">Subtotal</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${orderItems}">
                            <td class="align-middle fw-semibold" th:text="'#' + ${item.order.id}"></td>
                            <td class="align-middle" th:text="${item.product.name}"></td>
                            <td class="align-middle text-center" th:text="${item.quantity}"></td>
                            <td class="align-middle text-end"
                                th:text="'৳' + ${#numbers.formatDecimal(item.priceAtPurchase,1,2)}"></td>
                            <td class="align-middle text-end fw-semibold"
                                th:text="'৳' + ${#numbers.formatDecimal(item.priceAtPurchase.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}"></td>
                            <td class="align-middle text-center">
                                <span th:switch="${item.order.status.name()}">
                                    <span th:case="'PENDING'" class="badge bg-warning text-dark">Pending</span>
                                    <span th:case="'CONFIRMED'" class="badge bg-info">Confirmed</span>
                                    <span th:case="'PACKED'" class="badge bg-secondary">Packed</span>
                                    <span th:case="'SHIPPED'" class="badge bg-primary">Shipped</span>
                                    <span th:case="'DELIVERED'" class="badge bg-success">Delivered</span>
                                    <span th:case="'CANCELLED'" class="badge bg-danger">Cancelled</span>
                                </span>
                            </td>
                            <td class="align-middle text-center">
                                <form th:if="${item.order.status.name() != 'DELIVERED' and item.order.status.name() != 'CANCELLED'}"
                                      th:action="@{/seller/orders/{id}/advance(id=${item.order.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button th:if="${item.order.status.name() == 'PENDING'}"
                                            class="btn btn-sm btn-success" type="submit" title="Approve order and set out for delivery">
                                        <i class="bi bi-check-circle me-1"></i> Approve
                                    </button>
                                    <button th:if="${item.order.status.name() == 'CONFIRMED'}"
                                            class="btn btn-sm btn-outline-secondary" type="submit" title="Mark as packed">
                                        <i class="bi bi-box-seam me-1"></i> Mark Packed
                                    </button>
                                    <button th:if="${item.order.status.name() == 'PACKED'}"
                                            class="btn btn-sm btn-outline-primary" type="submit" title="Mark as shipped">
                                        <i class="bi bi-truck me-1"></i> Mark Shipped
                                    </button>
                                    <button th:if="${item.order.status.name() == 'SHIPPED'}"
                                            class="btn btn-sm btn-outline-success" type="submit" title="Mark as delivered">
                                        <i class="bi bi-check2-all me-1"></i> Mark Delivered
                                    </button>
                                </form>
                                <span th:if="${item.order.status.name() == 'DELIVERED' or item.order.status.name() == 'CANCELLED'}"
                                      class="text-muted small">—</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
