<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orders - Seller Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" th:href="@{/seller/dashboard}">
            <i class="bi bi-shop me-2"></i>Seller Panel
        </a>
        <div class="d-flex gap-2 ms-auto">
            <a th:href="@{/seller/dashboard}" class="btn btn-dark btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a th:href="@{/seller/products}" class="btn btn-dark btn-sm"><i class="bi bi-box-seam me-1"></i>Products</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-dark btn-sm" type="submit"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-bag-check me-2 text-warning"></i>My Orders</h2>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(orderItems)}" class="text-center py-5">
        <i class="bi bi-inbox" style="font-size:4rem; color:#adb5bd;"></i>
        <h4 class="mt-3 text-muted">No orders for your products yet</h4>
    </div>

    <!-- Order Items Table -->
    <div th:unless="${#lists.isEmpty(orderItems)}" class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Order #</th>
                    <th>Product</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">Price</th>
                    <th class="text-end">Subtotal</th>
                    <th class="text-center">Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${orderItems}">
                    <td class="align-middle fw-semibold" th:text="'#' + ${item.order.id}"></td>
                    <td class="align-middle" th:text="${item.product.name}"></td>
                    <td class="align-middle text-center" th:text="${item.quantity}"></td>
                    <td class="align-middle text-end"
                        th:text="'৳' + ${#numbers.formatDecimal(item.priceAtPurchase,1,2)}"></td>
                    <td class="align-middle text-end fw-semibold"
                        th:text="'৳' + ${#numbers.formatDecimal(item.priceAtPurchase.multiply(T(java.math.BigDecimal).valueOf(item.quantity)),1,2)}"></td>
                    <td class="align-middle text-center">
                        <span th:switch="${item.order.status.name()}">
                            <span th:case="'PENDING'" class="badge bg-warning text-dark">Pending</span>
                            <span th:case="'CONFIRMED'" class="badge bg-info">Confirmed</span>
                            <span th:case="'PACKED'" class="badge bg-secondary">Packed</span>
                            <span th:case="'SHIPPED'" class="badge bg-primary">Shipped</span>
                            <span th:case="'DELIVERED'" class="badge bg-success">Delivered</span>
                            <span th:case="'CANCELLED'" class="badge bg-danger">Cancelled</span>
                        </span>
                    </td>
                    <td class="align-middle text-center">
                        <form th:if="${item.order.status.name() != 'DELIVERED' and item.order.status.name() != 'CANCELLED'}"
                              th:action="@{/seller/orders/{id}/advance(id=${item.order.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-outline-success" type="submit"
                                    th:title="'Advance to next status'">
                                <i class="bi bi-arrow-right-circle"></i> Advance
                            </button>
                        </form>
                        <span th:if="${item.order.status.name() == 'DELIVERED' or item.order.status.name() == 'CANCELLED'}"
                              class="text-muted small">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
