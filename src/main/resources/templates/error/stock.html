<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Out of Stock | MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container text-center mt-5">
    <h1 class="display-1 text-warning">&#128722;</h1>
    <h2>Out of Stock</h2>
    <p class="text-muted" th:text="${errorMessage}">Sorry, insufficient stock.</p>
    <a href="/products" class="btn btn-primary">Browse Products</a>
</div>
</body>
</html>
