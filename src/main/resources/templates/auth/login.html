<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .brand-icon { font-size: 3rem; color: #667eea; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shop brand-icon"></i>
                    <h3 class="mt-2 fw-bold">MiniMarketPlace</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                <!-- Success / logout messages -->
                <div th:if="" class="alert alert-success alert-dismissible" role="alert">
                    You have been logged out successfully.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="" class="alert alert-success alert-dismissible" role="alert">
                    <span th:text=""></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="" class="alert alert-danger alert-dismissible" role="alert">
                    Invalid email or password. Please try again.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="" th:value="" />
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" name="email" class="form-control"
                                   placeholder="you@example.com" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" name="password" class="form-control"
                                   placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <hr class="my-3">
                <p class="text-center text-muted small mb-1">Don't have an account?</p>
                <div class="d-grid gap-2">
                    <a th:href="@{/register/buyer}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-person-plus me-1"></i>Register as Buyer
                    </a>
                    <a th:href="@{/register/seller}" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-shop me-1"></i>Register as Seller
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
