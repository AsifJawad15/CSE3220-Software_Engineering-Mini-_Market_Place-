<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register as Buyer - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .brand-icon { font-size: 2.5rem; color: #11998e; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus brand-icon"></i>
                    <h3 class="mt-2 fw-bold">Create Buyer Account</h3>
                    <p class="text-muted">Browse and shop on MiniMarketPlace</p>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <form th:action="@{/register/buyer}" th:object="${registerRequest}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <label for="fullName" class="form-label fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="fullName" th:field="*{fullName}"
                                   class="form-control" th:classappend=" ? 'is-invalid'"
                                   class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   class="form-control" th:classappend=" ? 'is-invalid'"
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" th:field="*{email}"
                                   class="form-control" th:classappend=" ? 'is-invalid'"
                                   class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                        </div>
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" th:field="*{password}"
                                   class="form-control" th:classappend=" ? 'is-invalid'"
                                   class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                        </div>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                   class="form-control" th:classappend=" ? 'is-invalid'"
                                   class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                        </div>
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                        <i class="bi bi-check-circle me-2"></i>Create Account
                    </button>
                </form>
                <hr class="my-3">
                <div class="text-center">
                    <p class="text-muted small mb-1">Already have an account?
                        <a th:href="@{/login}" class="text-decoration-none">Sign In</a>
                    </p>
                    <p class="text-muted small">Want to sell?
                        <a th:href="@{/register/seller}" class="text-decoration-none">Register as Seller</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
