<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Products - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.sidebar{min-height:100vh;background:#1e293b}.sidebar .nav-link{color:#94a3b8;border-radius:8px;margin-bottom:4px}.sidebar .nav-link:hover,.sidebar .nav-link.active{background:#334155;color:#fff}.sidebar .brand{color:#fff;font-weight:700;font-size:1.2rem}</style>
</head>
<body>
<div class="container-fluid"><div class="row">
    <div class="col-md-2 sidebar px-3 py-4">
        <div class="brand mb-4 px-2"><i class="bi bi-shield-check me-2"></i>Admin</div>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a class="nav-link" th:href="@{/admin/sellers}"><i class="bi bi-shop me-2"></i>Sellers</a>
            <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Users</a>
            <a class="nav-link active" th:href="@{/admin/products}"><i class="bi bi-box-seam me-2"></i>Products</a>
            <hr style="border-color:#334155">
            <form th:action="@{/logout}" method="post" class="d-inline"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/><button type="submit" class="nav-link btn btn-link text-start w-100 border-0" style="color:#94a3b8"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></form>
        </nav>
    </div>
    <div class="col-md-10 py-4 px-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-box-seam me-2 text-success"></i>All Products</h4>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white rounded">
                <thead class="table-light"><tr><th>Name</th><th>Seller</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td class="fw-semibold" th:text="${p.name}">Name</td>
                        <td th:text="${p.seller.shopName}">Shop</td>
                        <td><span class="badge bg-secondary" th:text="${p.category.name}">Cat</span></td>
                        <td>$<span th:text="${#numbers.formatDecimal(p.price,1,2)}">0</span></td>
                        <td th:text="${p.stockQuantity}">0</td>
                        <td><span th:if="${p.active}" class="badge bg-success">Active</span><span th:unless="${p.active}" class="badge bg-danger">Inactive</span></td>
                        <td>
                            <form th:action="@{/admin/products/{id}/toggle(id=${p.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button th:if="${p.active}" class="btn btn-sm btn-outline-danger"><i class="bi bi-pause-circle me-1"></i>Deactivate</button>
                                <button th:unless="${p.active}" class="btn btn-sm btn-outline-success"><i class="bi bi-play-circle me-1"></i>Activate</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
