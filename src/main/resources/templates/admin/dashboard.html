<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .stat-card { border-left: 4px solid; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar px-3 py-4">
            <div class="brand mb-4 px-2"><i class="bi bi-shield-check me-2"></i>Admin</div>
            <nav class="nav flex-column">
                <a class="nav-link active" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" th:href="@{/admin/sellers}"><i class="bi bi-shop me-2"></i>Sellers</a>
                <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Users</a>
                <a class="nav-link" th:href="@{/admin/products}"><i class="bi bi-box-seam me-2"></i>Products</a>
                <a class="nav-link" th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i>Orders</a>
                <hr style="border-color:#334155">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nav-link btn btn-link text-start w-100 border-0" style="color:#94a3b8;">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0">Admin Dashboard</h4>
                    <p class="text-muted mb-0" th:text="${user.email}">admin</p>
                </div>
                <span class="badge bg-danger fs-6 px-3 py-2"><i class="bi bi-shield-fill me-1"></i>Admin</span>
            </div>

            <!-- Stats Row -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card p-3" style="border-left-color:#6366f1;">
                        <div class="d-flex align-items-center">
                            <div class="me-3"><i class="bi bi-people-fill fs-2" style="color:#6366f1;"></i></div>
                            <div>
                                <p class="text-muted mb-0 small">Total Users</p>
                                <h4 class="fw-bold mb-0" th:text="${totalUsers}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3" style="border-left-color:#10b981;">
                        <div class="d-flex align-items-center">
                            <div class="me-3"><i class="bi bi-box-seam fs-2" style="color:#10b981;"></i></div>
                            <div>
                                <p class="text-muted mb-0 small">Total Products</p>
                                <h4 class="fw-bold mb-0" th:text="${totalProducts}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3" style="border-left-color:#f59e0b;">
                        <div class="d-flex align-items-center">
                            <div class="me-3"><i class="bi bi-hourglass-split fs-2" style="color:#f59e0b;"></i></div>
                            <div>
                                <p class="text-muted mb-0 small">Pending Sellers</p>
                                <h4 class="fw-bold mb-0" th:text="${pendingSellers}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3" style="border-left-color:#ef4444;">
                        <div class="d-flex align-items-center">
                            <div class="me-3"><i class="bi bi-check-circle fs-2" style="color:#ef4444;"></i></div>
                            <div>
                                <p class="text-muted mb-0 small">Approved Sellers</p>
                                <h4 class="fw-bold mb-0" th:text="${approvedSellers}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card p-4">
                <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem">Quick Actions</h6>
                <div class="d-flex gap-2">
                    <a th:href="@{/admin/sellers}" class="btn btn-outline-warning btn-sm"><i class="bi bi-shop me-1"></i>Manage Sellers</a>
                    <a th:href="@{/admin/users}" class="btn btn-outline-primary btn-sm"><i class="bi bi-people me-1"></i>Manage Users</a>
                    <a th:href="@{/admin/products}" class="btn btn-outline-success btn-sm"><i class="bi bi-box-seam me-1"></i>Manage Products</a>
                    <a th:href="@{/admin/orders}" class="btn btn-outline-info btn-sm"><i class="bi bi-receipt me-1"></i>View Orders</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
