<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.product-card{border:none;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.07);transition:transform .2s}.product-card:hover{transform:translateY(-4px)}.product-img{height:180px;object-fit:cover;border-radius:12px 12px 0 0;background:#e2e8f0}.currency-toggle-btn{transition:all .15s}</style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1e293b">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-shop me-2"></i>MiniMarketPlace</a>
        <div class="d-flex gap-2 align-items-center">
            <!-- Currency Switcher -->
            <div class="currency-switcher d-inline-flex align-items-center gap-1 rounded p-1" style="background:rgba(255,255,255,.1)">
                <i class="bi bi-currency-exchange text-white-50 me-1"></i>
                <button class="btn btn-sm btn-warning currency-toggle-btn fw-bold" data-currency="BDT" onclick="setCurrency('BDT')">৳ BDT</button>
                <button class="btn btn-sm btn-outline-secondary currency-toggle-btn" data-currency="USD" onclick="setCurrency('USD')">$ USD</button>
            </div>
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/buyer/dashboard}" sec:authorize="hasRole('BUYER')" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/seller/dashboard}" sec:authorize="hasRole('SELLER')" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="btn btn-outline-light btn-sm">Admin</a>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
            </span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <!-- Search & Filter -->
    <div class="row mb-4">
        <div class="col-md-6">
            <form th:action="@{/products}" method="get" class="d-flex gap-2">
                <input type="text" name="search" class="form-control" placeholder="Search products..."
                       th:value="${search}">
                <button class="btn btn-primary"><i class="bi bi-search"></i></button>
            </form>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/products}" class="btn btn-sm me-1" th:classappend="${selectedCategoryId == null && search == null} ? 'btn-primary' : 'btn-outline-secondary'">All</a>
            <a th:each="cat : ${categories}" th:href="@{/products(categoryId=${cat.id})}"
               class="btn btn-sm me-1"
               th:classappend="${selectedCategoryId != null && selectedCategoryId == cat.id} ? 'btn-primary' : 'btn-outline-secondary'"
               th:text="${cat.name}">Cat</a>
        </div>
    </div>

    <!-- Products Grid -->
    <div th:if="${products.totalElements == 0}" class="text-center py-5 text-muted">
        <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
        <h5>No products found</h5>
        <p>Try adjusting your search or filter.</p>
    </div>

    <div class="row g-3">
        <div th:each="p : ${products.content}" class="col-md-3">
            <div class="card product-card h-100">
                <div class="product-img d-flex align-items-center justify-content-center" th:if="${p.imageUrl == null || p.imageUrl.isBlank()}">
                    <i class="bi bi-image fs-1 text-muted"></i>
                </div>
                <img th:if="${p.imageUrl != null && !p.imageUrl.isBlank()}" th:src="${p.imageUrl}" class="product-img w-100" alt="Product">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-secondary mb-2 align-self-start" th:text="${p.category.name}">Category</span>
                    <h6 class="card-title fw-bold" th:text="${p.name}">Product</h6>
                    <p class="text-muted small mb-2" th:text="${#strings.abbreviate(p.description, 80)}">Desc</p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-primary fs-5"
                              th:attr="data-bdt=${p.price}"
                              th:text="'৳' + ${#numbers.formatDecimal(p.price,1,2)}">৳0.00</span>
                        <a th:href="@{/products/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">View</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${products.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number - 1}, categoryId=${selectedCategoryId}, search=${search})}">Prev</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" class="page-item"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link" th:href="@{/products(page=${i}, categoryId=${selectedCategoryId}, search=${search})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number + 1}, categoryId=${selectedCategoryId}, search=${search})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/currency.js"></script>
</body>
</html>
