<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name} + ' - MiniMarketPlace'">Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.detail-img{max-height:400px;object-fit:contain;background:#e2e8f0;border-radius:12px}.currency-toggle-btn{transition:all .15s}</style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1e293b">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-shop me-2"></i>MiniMarketPlace</a>
        <div class="d-flex gap-2 align-items-center">
            <!-- Currency Switcher -->
            <div class="currency-switcher d-inline-flex align-items-center gap-1 rounded p-1" style="background:rgba(255,255,255,.1)">
                <i class="bi bi-currency-exchange text-white-50 me-1"></i>
                <button class="btn btn-sm btn-warning currency-toggle-btn fw-bold" data-currency="BDT" onclick="setCurrency('BDT')">৳ BDT</button>
                <button class="btn btn-sm btn-outline-secondary currency-toggle-btn" data-currency="USD" onclick="setCurrency('USD')">$ USD</button>
            </div>
            <a th:href="@{/products}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-md-5">
            <div th:if="${product.imageUrl == null || product.imageUrl.isBlank()}" class="detail-img w-100 d-flex align-items-center justify-content-center" style="height:400px">
                <i class="bi bi-image" style="font-size:5rem;color:#94a3b8"></i>
            </div>
            <img th:if="${product.imageUrl != null && !product.imageUrl.isBlank()}" th:src="${product.imageUrl}" class="detail-img w-100" alt="Product">
        </div>
        <div class="col-md-7">
            <span class="badge bg-secondary mb-2" th:text="${product.category.name}">Category</span>
            <!-- Tags -->
            <span th:each="tag : ${product.tags}" class="badge bg-info text-dark mb-2 ms-1" th:text="${tag.name}">Tag</span>
            <h2 class="fw-bold" th:text="${product.name}">Product Name</h2>
            <h3 class="text-primary fw-bold"
                th:attr="data-bdt=${product.price}"
                th:text="'৳' + ${#numbers.formatDecimal(product.price,1,2)}">৳0.00</h3>
            <small id="exchange-rate-badge" class="text-muted" style="display:none"></small>
            <p class="text-muted" th:text="${product.description}">Description</p>
            <div class="mb-3">
                <span th:if="${product.stockQuantity > 0}" class="badge bg-success"><i class="bi bi-check-circle me-1"></i>In Stock (<span th:text="${product.stockQuantity}"></span>)</span>
                <span th:if="${product.stockQuantity <= 0}" class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>Out of Stock</span>
            </div>
            <p class="text-muted small">Sold by: <strong th:text="${product.seller.shopName}">Shop</strong></p>
            <!-- Add to Cart (Buyer only) -->
            <div sec:authorize="hasRole('BUYER')" th:if="${product.stockQuantity > 0}">
                <form th:action="@{/buyer/cart/add}" method="post" class="d-flex align-items-center gap-2 mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <input type="number" name="quantity" value="1" min="1"
                           th:max="${product.stockQuantity}" class="form-control" style="width:80px;">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-cart-plus me-2"></i>Add to Cart
                    </button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="mt-3">
                <a th:href="@{/login}" class="btn btn-outline-primary">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login to Buy
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/currency.js"></script>
</body>
</html>
