<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name} + ' - MiniMarketPlace'">Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body{background:#f5f7fa}.detail-img{max-height:400px;object-fit:contain;background:#e2e8f0;border-radius:12px}</style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1e293b">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-shop me-2"></i>MiniMarketPlace</a>
        <a th:href="@{/products}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-md-5">
            <div th:if="${product.imageUrl == null || product.imageUrl.isBlank()}" class="detail-img w-100 d-flex align-items-center justify-content-center" style="height:400px">
                <i class="bi bi-image" style="font-size:5rem;color:#94a3b8"></i>
            </div>
            <img th:if="${product.imageUrl != null && !product.imageUrl.isBlank()}" th:src="${product.imageUrl}" class="detail-img w-100" alt="Product">
        </div>
        <div class="col-md-7">
            <span class="badge bg-secondary mb-2" th:text="${product.category.name}">Category</span>
            <h2 class="fw-bold" th:text="${product.name}">Product Name</h2>
            <h3 class="text-primary fw-bold">$<span th:text="${#numbers.formatDecimal(product.price,1,2)}">0.00</span></h3>
            <p class="text-muted" th:text="${product.description}">Description</p>
            <div class="mb-3">
                <span th:if="${product.stockQuantity > 0}" class="badge bg-success"><i class="bi bi-check-circle me-1"></i>In Stock (<span th:text="${product.stockQuantity}"></span>)</span>
                <span th:if="${product.stockQuantity <= 0}" class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>Out of Stock</span>
            </div>
            <p class="text-muted small">Sold by: <strong th:text="${product.seller.shopName}">Shop</strong></p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
