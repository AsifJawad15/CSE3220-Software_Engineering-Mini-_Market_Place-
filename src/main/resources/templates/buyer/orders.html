<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Orders - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/products}"><i class="bi bi-shop me-2"></i>MiniMarketPlace</a>
        <div class="d-flex gap-2 ms-auto">
            <a th:href="@{/buyer/cart}" class="btn btn-outline-light btn-sm"><i class="bi bi-cart3 me-1"></i>Cart</a>
            <a th:href="@{/buyer/dashboard}" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-box-seam me-2 text-primary"></i>My Orders</h2>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty Orders -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <i class="bi bi-box" style="font-size:4rem; color:#adb5bd;"></i>
        <h4 class="mt-3 text-muted">No orders yet</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-3">
            <i class="bi bi-bag-plus me-1"></i>Start Shopping
        </a>
    </div>

    <!-- Orders Table -->
    <div th:unless="${#lists.isEmpty(orders)}" class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th class="text-end">Total</th>
                    <th class="text-center">Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td class="align-middle fw-semibold" th:text="'#' + ${order.id}"></td>
                    <td class="align-middle" th:text="${#temporals.format(order.createdAt,'dd MMM yyyy')}"></td>
                    <td class="align-middle" th:text="${#lists.size(order.items)} + ' item(s)'"></td>
                    <td class="align-middle text-end fw-semibold"
                        th:text="'৳' + ${#numbers.formatDecimal(order.totalAmount,1,2)}"></td>
                    <td class="align-middle text-center">
                        <span th:switch="${order.status.name()}">
                            <span th:case="'PENDING'" class="badge bg-warning text-dark">Pending</span>
                            <span th:case="'CONFIRMED'" class="badge bg-info">Confirmed</span>
                            <span th:case="'PACKED'" class="badge bg-secondary">Packed</span>
                            <span th:case="'SHIPPED'" class="badge bg-primary">Shipped</span>
                            <span th:case="'DELIVERED'" class="badge bg-success">Delivered</span>
                            <span th:case="'CANCELLED'" class="badge bg-danger">Cancelled</span>
                        </span>
                    </td>
                    <td class="align-middle text-center">
                        <a th:href="@{/buyer/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-eye"></i>
                        </a>
                        <form th:if="${order.status.name() == 'PENDING'}"
                              th:action="@{/buyer/orders/{id}/cancel(id=${order.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Cancel this order?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-outline-danger" type="submit">
                                <i class="bi bi-x-circle"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
