<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Orders - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: buyer('orders')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-box-seam me-2 text-primary"></i>My Orders</h4>

            <!-- Alerts -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Empty Orders -->
            <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                <i class="bi bi-box" style="font-size:4rem; color:#adb5bd;"></i>
                <h4 class="mt-3 text-muted">No orders yet</h4>
                <a th:href="@{/products}" class="btn btn-primary mt-3">
                    <i class="bi bi-bag-plus me-1"></i>Start Shopping
                </a>
            </div>

            <!-- Orders Table -->
            <div th:unless="${#lists.isEmpty(orders)}" class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Order #</th>
                            <th>Date</th>
                            <th>Items</th>
                            <th class="text-end">Total</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="align-middle fw-semibold" th:text="'#' + ${order.id}"></td>
                            <td class="align-middle" th:text="${#temporals.format(order.createdAt,'dd MMM yyyy')}"></td>
                            <td class="align-middle" th:text="${#lists.size(order.items)} + ' item(s)'"></td>
                            <td class="align-middle text-end fw-semibold"
                                th:text="'৳' + ${#numbers.formatDecimal(order.totalAmount,1,2)}"></td>
                            <td class="align-middle text-center">
                                <span th:switch="${order.status.name()}">
                                    <span th:case="'PENDING'" class="badge bg-info"><i class="bi bi-clock me-1"></i>Order Placed</span>
                                    <span th:case="'CONFIRMED'" class="badge bg-primary"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                                    <span th:case="'PACKED'" class="badge bg-primary"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                                    <span th:case="'SHIPPED'" class="badge bg-primary"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                                    <span th:case="'DELIVERED'" class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Delivered</span>
                                    <span th:case="'CANCELLED'" class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>Cancelled</span>
                                </span>
                            </td>
                            <td class="align-middle text-center">
                                <a th:href="@{/buyer/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <form th:if="${order.status.name() == 'PENDING'}"
                                      th:action="@{/buyer/orders/{id}/cancel(id=${order.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Cancel this order?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
