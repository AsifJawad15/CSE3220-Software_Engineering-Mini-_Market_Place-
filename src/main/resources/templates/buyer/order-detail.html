<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Detail - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: buyer('orders')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">
                    <i class="bi bi-receipt me-2 text-primary"></i>Order <span th:text="'#' + ${order.id}"></span>
                </h4>
                <span th:switch="${order.status.name()}">
                    <span th:case="'PENDING'" class="badge bg-info fs-6"><i class="bi bi-clock me-1"></i>Order Placed</span>
                    <span th:case="'CONFIRMED'" class="badge bg-primary fs-6"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                    <span th:case="'PACKED'" class="badge bg-primary fs-6"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                    <span th:case="'SHIPPED'" class="badge bg-primary fs-6"><i class="bi bi-truck me-1"></i>Out for Delivery</span>
                    <span th:case="'DELIVERED'" class="badge bg-success fs-6"><i class="bi bi-check-circle me-1"></i>Delivered</span>
                    <span th:case="'CANCELLED'" class="badge bg-danger fs-6"><i class="bi bi-x-circle me-1"></i>Cancelled</span>
                </span>
            </div>

            <div class="row g-4">
                <!-- Order Items -->
                <div class="col-md-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header fw-bold"><i class="bi bi-bag-check me-2"></i>Items Ordered</div>
                        <div class="card-body p-0">
                            <table class="table mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>Product</th>
                                    <th>Seller</th>
                                    <th class="text-center">Qty</th>
                                    <th class="text-end">Price</th>
                                    <th class="text-end">Subtotal</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="item : ${order.items}">
                                    <td>
                                        <a th:href="@{/products/{id}(id=${item.product.id})}"
                                           th:text="${item.product.name}" class="text-decoration-none fw-semibold"></a>
                                    </td>
                                    <td class="text-muted small" th:text="${item.sellerProfile.shopName}"></td>
                                    <td class="text-center" th:text="${item.quantity}"></td>
                                    <td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(item.priceAtPurchase,1,2)}"></td>
                                    <td class="text-end fw-semibold"
                                        th:text="'৳' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                                </tr>
                                </tbody>
                                <tfoot class="table-light">
                                <tr>
                                    <td colspan="4" class="text-end fw-bold">Total</td>
                                    <td class="text-end fw-bold text-primary"
                                        th:text="'৳' + ${#numbers.formatDecimal(order.totalAmount,1,2)}"></td>
                                </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Order Info -->
                <div class="col-md-4">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header fw-bold"><i class="bi bi-info-circle me-2"></i>Order Info</div>
                        <div class="card-body">
                            <p class="mb-2"><strong>Order ID:</strong> <span th:text="'#' + ${order.id}"></span></p>
                            <p class="mb-2"><strong>Date:</strong>
                                <span th:text="${#temporals.format(order.createdAt,'dd MMM yyyy, HH:mm')}"></span></p>
                            <p class="mb-2"><strong>Status:</strong>
                                <span th:switch="${order.status.name()}">
                                    <span th:case="'PENDING'">Order Placed</span>
                                    <span th:case="'CONFIRMED'">Out for Delivery</span>
                                    <span th:case="'PACKED'">Out for Delivery</span>
                                    <span th:case="'SHIPPED'">Out for Delivery</span>
                                    <span th:case="'DELIVERED'">Delivered</span>
                                    <span th:case="'CANCELLED'">Cancelled</span>
                                </span>
                            </p>
                            <p class="mb-0"><strong>Total:</strong>
                                <span class="text-primary fw-bold"
                                      th:text="'৳' + ${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></p>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-3">
                        <div class="card-header fw-bold"><i class="bi bi-geo-alt me-2"></i>Shipping Address</div>
                        <div class="card-body">
                            <p class="mb-0" th:text="${order.shippingAddress}"></p>
                        </div>
                    </div>

                    <!-- Cancel Button -->
                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/buyer/orders/{id}/cancel(id=${order.id})}"
                          method="post" onsubmit="return confirm('Are you sure you want to cancel this order?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-danger w-100" type="submit">
                            <i class="bi bi-x-circle me-2"></i>Cancel Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
