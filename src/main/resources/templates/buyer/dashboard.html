<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buyer Dashboard - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .stat-card { border-left: 4px solid; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar px-3 py-4">
            <div class="brand mb-4 px-2"><i class="bi bi-shop me-2"></i>MiniMarket</div>
            <nav class="nav flex-column">
                <a class="nav-link active" th:href="@{/buyer/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" th:href="@{/buyer/profile}"><i class="bi bi-person me-2"></i>Profile</a>
                <a class="nav-link" th:href="@{/buyer/addresses}"><i class="bi bi-geo-alt me-2"></i>Addresses</a>
                <a class="nav-link" th:href="@{/buyer/cart}"><i class="bi bi-cart3 me-2"></i>My Cart</a>
                <a class="nav-link" th:href="@{/buyer/orders}"><i class="bi bi-box-seam me-2"></i>My Orders</a>
                <a class="nav-link" th:href="@{/products}"><i class="bi bi-grid me-2"></i>Browse Products</a>
                <hr style="border-color:#334155">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nav-link btn btn-link text-start w-100 border-0"
                            style="color:#94a3b8;">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0">Welcome back, <span th:text="${user.fullName}">Buyer</span>!</h4>
                    <p class="text-muted mb-0" th:text="${user.email}">email</p>
                </div>
                <span class="badge bg-success fs-6 px-3 py-2"><i class="bi bi-person-check me-1"></i>Buyer</span>
            </div>

            <!-- Flash message -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stats Row -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card stat-card p-3" style="border-left-color:#6366f1;">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="bi bi-geo-alt-fill fs-2" style="color:#6366f1;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Saved Addresses</p>
                                <h4 class="fw-bold mb-0" th:text="${addressCount}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-3" style="border-left-color:#10b981;">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="bi bi-phone fs-2" style="color:#10b981;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Phone</p>
                                <h6 class="fw-bold mb-0" th:text="${profile.phone != null ? profile.phone : 'Not set'}">—</h6>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-3" style="border-left-color:#f59e0b;">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="bi bi-bag-check fs-2" style="color:#f59e0b;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Orders</p>
                                <h4 class="fw-bold mb-0" th:text="${orderCount}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-3" style="border-left-color:#3b82f6;">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="bi bi-cart3 fs-2" style="color:#3b82f6;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Cart Items</p>
                                <h4 class="fw-bold mb-0" th:text="${cartItemCount}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card p-4">
                <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem;letter-spacing:.05em;">Quick Actions</h6>
                <div class="row g-2">
                    <div class="col-auto">
                        <a th:href="@{/buyer/cart}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-cart3 me-1"></i>View Cart
                        </a>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/buyer/orders}" class="btn btn-outline-success btn-sm">
                            <i class="bi bi-box-seam me-1"></i>My Orders
                        </a>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/buyer/profile}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-pencil me-1"></i>Edit Profile
                        </a>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/buyer/addresses}" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-plus-circle me-1"></i>Manage Addresses
                        </a>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/products}" class="btn btn-primary btn-sm">
                            <i class="bi bi-grid me-1"></i>Browse Products
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
