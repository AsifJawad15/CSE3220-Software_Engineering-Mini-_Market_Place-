<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Addresses - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .address-card { border: 2px solid #e2e8f0; border-radius: 10px; transition: border-color .2s; }
        .address-card.default-addr { border-color: #6366f1; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: buyer('addresses')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-geo-alt me-2 text-primary"></i>My Addresses</h4>

            <!-- Flash messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">
                <!-- Existing Addresses -->
                <div class="col-md-7">
                    <div th:if="${#lists.isEmpty(addresses)}" class="text-center py-5 text-muted">
                        <i class="bi bi-geo-alt fs-1 d-block mb-2"></i>
                        <p>No addresses saved yet. Add your first address.</p>
                    </div>
                    <div th:each="addr : ${addresses}" class="address-card p-3 mb-3"
                         th:classappend="${addr.defaultAddress} ? 'default-addr'">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span th:if="${addr.label}" class="badge bg-secondary me-1" th:text="${addr.label}"></span>
                                <span th:if="${addr.defaultAddress}" class="badge bg-primary me-1"><i class="bi bi-star-fill me-1"></i>Default</span>
                                <p class="mb-1 fw-semibold" th:text="${addr.line1}"></p>
                                <p class="mb-1 text-muted small">
                                    <span th:text="${addr.city}"></span>,
                                    <span th:if="${addr.postal}" th:text="${addr.postal + ', '}"></span>
                                    <span th:text="${addr.country}"></span>
                                </p>
                                <p th:if="${addr.phone}" class="mb-0 text-muted small"><i class="bi bi-phone me-1"></i><span th:text="${addr.phone}"></span></p>
                            </div>
                            <div class="d-flex gap-2">
                                <form th:unless="${addr.defaultAddress}" th:action="@{/buyer/addresses/{id}/default(id=${addr.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-primary" title="Set as default">
                                        <i class="bi bi-star"></i>
                                    </button>
                                </form>
                                <form th:action="@{/buyer/addresses/{id}/delete(id=${addr.id})}" method="post"
                                      onsubmit="return confirm('Delete this address?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add New Address Form -->
                <div class="col-md-5">
                    <div class="card p-4">
                        <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem;">Add New Address</h6>
                        <form th:action="@{/buyer/addresses}" method="post" th:object="${newAddress}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Label (optional)</label>
                                <input type="text" th:field="*{label}" class="form-control form-control-sm"
                                       placeholder="Home, Work, etc.">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Address Line 1 *</label>
                                <input type="text" th:field="*{line1}" class="form-control form-control-sm"
                                       th:classappend="${#fields.hasErrors('line1')} ? 'is-invalid'"
                                       placeholder="Street address">
                                <div class="invalid-feedback" th:errors="*{line1}"></div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">City *</label>
                                <input type="text" th:field="*{city}" class="form-control form-control-sm"
                                       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"
                                       placeholder="City">
                                <div class="invalid-feedback" th:errors="*{city}"></div>
                            </div>
                            <div class="row g-2 mb-2">
                                <div class="col">
                                    <label class="form-label small fw-semibold">Postal Code</label>
                                    <input type="text" th:field="*{postal}" class="form-control form-control-sm" placeholder="12345">
                                </div>
                                <div class="col">
                                    <label class="form-label small fw-semibold">Country *</label>
                                    <input type="text" th:field="*{country}" class="form-control form-control-sm"
                                           th:classappend="${#fields.hasErrors('country')} ? 'is-invalid'"
                                           placeholder="Country">
                                    <div class="invalid-feedback" th:errors="*{country}"></div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Phone</label>
                                <input type="text" th:field="*{phone}" class="form-control form-control-sm" placeholder="+1234567890">
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" th:field="*{makeDefault}" id="makeDefault">
                                <label class="form-check-label small" for="makeDefault">Set as default address</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100">
                                <i class="bi bi-plus-circle me-1"></i>Add Address
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
