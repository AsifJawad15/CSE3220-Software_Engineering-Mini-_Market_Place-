<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: buyer('cart')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-credit-card me-2 text-primary"></i>Checkout</h4>

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">
                <!-- Left: Address Selection -->
                <div class="col-md-7">
                    <form th:action="@{/buyer/checkout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header fw-bold"><i class="bi bi-geo-alt me-2"></i>Shipping Address</div>
                            <div class="card-body">
                                <div th:if="${#lists.isEmpty(addresses)}" class="alert alert-warning mb-0">
                                    No addresses saved. <a th:href="@{/buyer/addresses}">Add an address</a> first.
                                </div>
                                <div th:unless="${#lists.isEmpty(addresses)}">
                                    <div th:each="addr : ${addresses}" class="form-check mb-3">
                                        <input class="form-check-input" type="radio" name="addressId"
                                               th:value="${addr.id}" th:id="'addr' + ${addr.id}"
                                               th:checked="${addr.defaultAddress}">
                                        <label class="form-check-label" th:for="'addr' + ${addr.id}">
                                            <strong th:text="${addr.label}"></strong>
                                            — <span th:text="${addr.line1 + ', ' + addr.city + ', ' + addr.postal + ', ' + addr.country}"></span>
                                            <span th:if="${addr.defaultAddress}" class="badge bg-success ms-1">Default</span>
                                        </label>
                                    </div>
                                </div>
                                <a th:href="@{/buyer/addresses}" class="btn btn-sm btn-outline-secondary mt-2">
                                    <i class="bi bi-plus-circle me-1"></i>Manage Addresses
                                </a>
                            </div>
                        </div>

                        <!-- Order Items Summary -->
                        <div class="card shadow-sm mb-4">
                            <div class="card-header fw-bold"><i class="bi bi-bag-check me-2"></i>Order Items</div>
                            <div class="card-body p-0">
                                <table class="table table-sm mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th>Product</th>
                                        <th class="text-center">Qty</th>
                                        <th class="text-end">Price</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item : ${cart.items}">
                                        <td th:text="${item.product.name}"></td>
                                        <td class="text-center" th:text="${item.quantity}"></td>
                                        <td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(item.unitPriceSnapshot,1,2)}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100"
                                th:disabled="${#lists.isEmpty(addresses)}">
                            <i class="bi bi-check-circle me-2"></i>Place Order
                        </button>
                    </form>
                </div>

                <!-- Right: Summary -->
                <div class="col-md-5">
                    <div class="card shadow-sm">
                        <div class="card-header fw-bold"><i class="bi bi-receipt me-2"></i>Order Summary</div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span th:text="'Items (' + ${#lists.size(cart.items)} + ')'"></span>
                                <strong th:text="'৳' + ${#numbers.formatDecimal(cartTotal,1,2)}"></strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Shipping</span>
                                <span class="text-success fw-semibold">Free</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong class="fs-5">Total</strong>
                                <strong class="fs-5 text-primary" th:text="'৳' + ${#numbers.formatDecimal(cartTotal,1,2)}"></strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
