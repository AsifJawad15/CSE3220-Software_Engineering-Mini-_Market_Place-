<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile - MiniMarketPlace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: buyer('profile')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</h4>

            <!-- Flash messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">
                <!-- Account Info (read-only) -->
                <div class="col-md-5">
                    <div class="card p-4">
                        <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem;">Account Info</h6>
                        <div class="mb-3">
                            <div class="d-flex align-items-center justify-content-center mb-3">
                                <div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center"
                                     style="width:72px;height:72px;font-size:2rem;">
                                    <i class="bi bi-person"></i>
                                </div>
                            </div>
                            <p class="mb-1"><strong>Name:</strong> <span th:text="${user.fullName}"></span></p>
                            <p class="mb-1"><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                            <p class="mb-1"><strong>Role:</strong>
                                <span class="badge bg-success" th:text="${user.role}"></span>
                            </p>
                            <p class="mb-1"><strong>Phone:</strong>
                                <span th:text="${profile.phone != null ? profile.phone : '—'}"></span>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Edit Form -->
                <div class="col-md-7">
                    <div class="card p-4">
                        <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem;">Update Profile</h6>
                        <form th:action="@{/buyer/profile}" method="post" th:object="${updateRequest}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                    <input type="text" th:field="*{phone}" class="form-control"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           placeholder="e.g. +1234567890"
                                           th:value="${profile.phone}">
                                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Save Changes
                            </button>
                            <a th:href="@{/buyer/dashboard}" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
