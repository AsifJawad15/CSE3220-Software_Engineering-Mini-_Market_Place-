services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=minimarketplace'
      - 'POSTGRES_USER=miniuser'
      - 'POSTGRES_PASSWORD=minipass'
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniuser -d minimarketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
