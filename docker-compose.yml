services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: minimarketplace-db
    environment:
      POSTGRES_DB: minimarketplace
      POSTGRES_USER: miniuser
      POSTGRES_PASSWORD: minipass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniuser -d minimarketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minimarket-net

  # ── Spring Boot Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minimarketplace-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minimarketplace
      DB_USER: miniuser
      DB_PASS: minipass
      PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - minimarket-net

volumes:
  postgres_data:

networks:
  minimarket-net:
    driver: bridge

